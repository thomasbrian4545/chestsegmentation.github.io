<!DOCTYPE html>
<!-- Menentukan tipe dokumen HTML5 -->
<html lang="id">
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Judul halaman yang tampil di tab browser -->
    <title>Chest X-ray Tuberculosis Segmentation</title>

    <!-- Import Bootstrap CSS untuk styling cepat -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Import file CSS custom -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Container utama -->
<div class="container py-5">

    <!-- ================= HEADER ================= -->
    <div class="text-center mb-4">

        <!-- Judul aplikasi -->
        <h1 class="fw-bold">
            Chest X-ray Tuberculosis Segmentation
        </h1>

        <!-- Deskripsi singkat aplikasi -->
        <p class="text-muted">
            Upload a chest X-ray image to analyze and segment 
            potential tuberculosis-affected regions using an AI-based system.
        </p>
    </div>

    <!-- ================= MAIN LAYOUT ================= -->
    <div class="row g-4">

        <!-- ================================================= -->
        <!-- LEFT SECTION : Upload Image -->
        <!-- ================================================= -->
        <div class="col-md-4">

            <!-- Card upload -->
            <div class="card shadow-lg border-0 h-100">

                <div class="card-body">

                    <!-- Judul card -->
                    <h5 class="card-title mb-3">
                        Upload Image
                    </h5>

                    <!-- Area upload file -->
                    <label class="upload-box w-100">

                        <!-- Input file disembunyikan -->
                        <input type="file" id="fileInput" hidden>

                        <!-- Tampilan custom upload -->
                        <div class="text-center">
                            <p class="mb-1">
                                📁 Click or Drag the X-ray image
                            </p>

                            <!-- Format file yang didukung -->
                            <small class="text-muted">
                                JPG, PNG
                            </small>
                        </div>
                    </label>

                    <!-- ========================================= -->
                    <!-- Preview gambar yang diupload -->
                    <!-- Awalnya disembunyikan dengan class d-none -->
                    <!-- ========================================= -->
                    <img 
                        id="imagePreview" 
                        class="img-fluid mt-3 rounded d-none"
                    >

                    <!-- Tombol untuk memulai proses deteksi -->
                    <button class="btn detect-btn btn-info w-100 mt-3 fw-bold">
                        Detect
                    </button>

                </div>
            </div>
        </div>

        <!-- ================================================= -->
        <!-- RIGHT SECTION : Detection Result -->
        <!-- ================================================= -->
        <div class="col-md-8">

            <!-- Card hasil deteksi -->
            <div class="card shadow-lg border-0 h-100">

                <div class="card-body text-center">

                    <!-- Judul hasil -->
                    <h5 class="card-title mb-3">
                        Detection Result
                    </h5>

                    <!-- ========================================= -->
                    <!-- Area preview hasil deteksi -->
                    <!-- ========================================= -->
                    <div class="image-preview mb-3 position-relative d-inline-block">

                        <!-- Gambar hasil -->
                        <img 
                            id="resultImage" 
                            class="img-fluid rounded"
                        >

                        <!-- Canvas untuk menggambar segmentasi -->
                        <canvas id="canvas"></canvas>

                    </div>

                    <!-- ========================================= -->
                    <!-- Box hasil deteksi -->
                    <!-- Menampilkan daftar objek yang terdeteksi -->
                    <!-- ========================================= -->
                    <div class="result-box p-3 rounded text-start">

                        <h6>Detected Objects:</h6>

                        <!-- List hasil deteksi -->
                        <ul id="resultList" class="mb-0"></ul>

                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- ================= FOOTER ================= -->
    <div class="text-center mt-4 text-muted">

        <!-- Copyright -->
        <small>© 2026 Stunning Vision AI</small>

    </div>

</div>

<!-- Import file JavaScript -->
<script src="script.js"></script>

</body>
</html>
